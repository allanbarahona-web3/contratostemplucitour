<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firma de contrato</title>
    <link rel="stylesheet" href="./styles.css?v=20260321s" />
    <script src="./config.js?v=20260321s"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="./sign-contract.js?v=20260321s" defer></script>
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="history-shell">
      <section class="panel history-main-panel">
        <header class="panel-header">
          <p class="kicker">Firma electronica</p>
          <h1>Firma de Contrato</h1>
          <p id="publicSignStatus">Cargando contrato...</p>
        </header>

        <section class="history-standalone-toolbar">
          <p><strong>Contrato:</strong> <span id="publicContractNumber">-</span></p>
          <p><strong>Cliente:</strong> <span id="publicClientName">-</span></p>
          <p><strong>Estado:</strong> <span id="publicContractState">-</span></p>
        </section>

        <section class="history-standalone-list">
          <div id="publicReadStep" class="history-table-wrap" style="padding: 10px;">
            <div class="signature-actions" style="justify-content:flex-start;margin-bottom:8px;">
              <button id="publicViewContractButton" type="button" class="ghost">Ver contrato</button>
              <button id="publicGoToSignButton" type="button" disabled>Firmar</button>
            </div>
            <iframe id="publicContractFrame" title="Contrato" style="width:100%;height:58vh;border:0;border-radius:10px;background:#f4f8ff;display:none;"></iframe>
          </div>

          <div id="publicSignStep" class="signature-panel hidden" style="margin-top:12px;">
            <div class="viewer-body signature-body">
              <p class="signature-help"><strong>Paso 2:</strong> Firma en el recuadro y luego presiona Enviar contrato firmado.</p>
              <label>Nombre de quien firma
                <input id="publicSignedByName" type="text" placeholder="Nombre completo" maxlength="120" />
              </label>
              <div class="signature-canvas-wrap">
                <canvas id="publicSignatureCanvas" width="900" height="260"></canvas>
              </div>
              <div class="signature-actions">
                <button id="publicBackToReadButton" type="button" class="ghost">Volver a ver contrato</button>
                <button id="publicSignatureClear" type="button" class="ghost">Borrar firma</button>
                <button id="publicSignatureSubmit" type="button">Enviar contrato firmado</button>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
