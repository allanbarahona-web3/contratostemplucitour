<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a3a5c" />
    <title>Firmar contrato – Lucitours</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js" defer></script>
  </head>
  <body class="sign-page-body">
    <div class="sign-page">

      <!-- Loading state -->
      <div id="loadingState" class="sign-loading">
        <p>Cargando contrato&hellip;</p>
      </div>

      <!-- Error state -->
      <div id="errorState" class="sign-error hidden">
        <p id="errorMessage">Ocurrio un error.</p>
      </div>

      <!-- Step 1: Read contract -->
      <div id="readStep" class="sign-step hidden">
        <header class="sign-header">
          <img src="./assets/lucitours-logo.png" alt="Lucitours" class="sign-logo" onerror="this.style.display='none'" />
          <div class="sign-meta">
            <p class="sign-contract-number" id="publicContractNumber">–</p>
            <p class="sign-client-name" id="publicClientName">–</p>
            <p class="sign-state-badge" id="publicContractState">–</p>
          </div>
        </header>

        <p class="sign-instruction">Lee el contrato completo antes de firmar.</p>

        <div class="sign-contract-frame-wrap">
          <iframe
            id="publicContractFrame"
            class="sign-contract-frame"
            title="Contrato"
            sandbox="allow-same-origin"
          ></iframe>
        </div>

        <div class="sign-actions">
          <button type="button" id="goToSignButton" class="sign-btn sign-btn--primary" disabled>
            Firmar contrato
          </button>
        </div>

        <p id="publicSignStatus" class="sign-status" role="status" aria-live="polite"></p>
      </div>

      <!-- Step 2: Draw signature -->
      <div id="signStep" class="sign-step hidden">
        <header class="sign-header">
          <img src="./assets/lucitours-logo.png" alt="Lucitours" class="sign-logo" onerror="this.style.display='none'" />
          <p class="sign-step-label">Paso 2 &mdash; Firma</p>
        </header>

        <p class="sign-instruction">
          Firma con tu dedo o el ratón en el recuadro de abajo.
        </p>

        <div class="sign-canvas-wrap">
          <p class="sign-canvas-label">Tu firma</p>
          <canvas id="publicSignatureCanvas" class="sign-canvas" aria-label="Lienzo de firma"></canvas>
        </div>

        <div class="sign-actions sign-actions--row">
          <button type="button" id="backToReadButton" class="sign-btn sign-btn--ghost">Atrás</button>
          <button type="button" id="publicSignatureClear" class="sign-btn sign-btn--ghost">Borrar</button>
          <button type="button" id="publicSignatureSubmit" class="sign-btn sign-btn--primary">
            Enviar firma
          </button>
        </div>

        <p id="signStepStatus" class="sign-status" role="status" aria-live="polite"></p>
      </div>

      <!-- Step 3: Success -->
      <div id="successStep" class="sign-step hidden">
        <div class="sign-success">
          <div class="sign-success-icon" aria-hidden="true">&#10003;</div>
          <h2>¡Firma registrada!</h2>
          <p id="successMessage">Tu firma fue enviada correctamente.</p>
        </div>
      </div>

    </div>
    <script src="./sign-contract.js"></script>
  </body>
</html>
