name: contratostempapi
region: nyc
services:
  - name: backend
    github:
      repo: allanbarahona-web3/contratostemplucitour
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_count: 1
    # professional-xs = 1 vCPU / 2 GB RAM — minimum viable for Chromium/Puppeteer
    # basic-xxs (512 MB) causes OOM crashes when Chrome renders the PDF
    instance_size_slug: professional-xs
    http_port: 3001
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_DISABLE_SANDBOX
        value: "true"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
