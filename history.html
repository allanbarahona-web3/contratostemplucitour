<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de Contratos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js?v=20260321m"></script>
    <script src="./history.js?v=20260321m" defer></script>
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="history-shell">
      <section class="panel history-main-panel">
        <header class="panel-header">
          <div class="history-top-row">
            <p class="kicker">Control de contratos</p>
            <a href="./index.html" class="agent-nav-link">Volver al formulario</a>
          </div>
          <h1>Historial de Contratos</h1>
          <p>Consulta global para agentes por nombre, identificacion, numero de contrato o correo.</p>
        </header>

        <section class="history-standalone-toolbar">
          <div class="history-search-row">
            <input
              id="historySearch"
              type="search"
              placeholder="Buscar cliente, identificacion, contrato o correo"
            />
            <button id="historySearchButton" type="button" class="ghost">Buscar</button>
          </div>
        </section>

        <section id="historyList" class="history-standalone-list">
          <p class="history-empty">Cargando historial...</p>
        </section>
      </section>
    </main>
  </body>
</html>
